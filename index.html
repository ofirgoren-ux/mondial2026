<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד מונדיאל - מערכת פרו מלאה (מאוחדת)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #12151c; --card-bg: #1e232e; --text-main: #ffffff; --text-muted: #9aa7b5;
            --border-color: #303746; --accent-blue: #45a29e; --accent-cyan: #66fcf1;
            --shadow: 0 10px 25px rgba(0,0,0,0.4); --border-radius: 16px;
            --color-exact: #00e676; --color-trend: #ffb300; --color-wrong: #ff3333; --color-pending: #ffd700;
        }
        body { font-family: 'Heebo', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        
        .top-nav { max-width: 1600px; margin: 0 auto 30px auto; text-align: center; }
        .nav-title { font-size: 2.2rem; margin-bottom: 20px; letter-spacing: 1px; font-weight: 800; color: var(--text-main); text-shadow: 0 2px 10px rgba(102, 252, 241, 0.3); }
        .stats-panel { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 25px; }
        .stat-box { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px 25px; text-align: center; box-shadow: var(--shadow); min-width: 120px; transition: transform 0.2s ease; }
        .stat-box:hover { transform: translateY(-3px); }
        .stat-value { font-size: 2rem; font-weight: 900; line-height: 1; margin-bottom: 5px; }
        .stat-value.exact { color: var(--color-exact); text-shadow: 0 0 10px rgba(0,230,118,0.3); }
        .stat-value.trend { color: var(--color-trend); text-shadow: 0 0 10px rgba(255,179,0,0.3); }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;}

        .filters-row { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; background-color: var(--card-bg); padding: 15px 30px; border-radius: 40px; box-shadow: var(--shadow); border: 1px solid var(--border-color); width: fit-content; margin: 0 auto; max-width: 95%; }
        .filter-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .filter-label { color: var(--text-muted); font-size: 0.9rem; font-weight: 600; margin-left: 5px; }
        .filter-divider { color: var(--border-color); margin: 0 5px; user-select: none; }
        .filter-btn { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 6px 14px; border-radius: 30px; cursor: pointer; font-family: 'Heebo', sans-serif; font-size: 0.85rem; font-weight: 600; transition: all 0.2s ease; }
        .filter-btn:hover { border-color: var(--accent-cyan); color: var(--text-main); background-color: rgba(102, 252, 241, 0.05); }
        .filter-btn.active { background-color: var(--accent-blue); color: #fff; border-color: var(--accent-blue); box-shadow: 0 2px 8px rgba(69, 162, 158, 0.4); }
        .special-btn { border-color: var(--accent-cyan); color: var(--accent-cyan); }

        #standings-container { display: none; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1600px; margin: 0 auto 30px auto; animation: tabFadeIn 0.4s ease; }
        .group-table-card { background-color: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 15px; width: 350px; box-shadow: var(--shadow); }
        .group-table-title { color: var(--accent-cyan); font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;}
        .standings-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: center; }
        .standings-table th { color: var(--text-muted); padding: 5px; border-bottom: 1px solid var(--border-color); }
        .standings-table td { padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .team-cell { display: flex; align-items: center; gap: 8px; font-weight: 600; text-align: right; }
        .team-cell img { width: 20px; border-radius: 2px; }

        .matches-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1600px; margin: 0 auto; }
        @media (max-width: 1300px) { .matches-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .matches-grid { grid-template-columns: 1fr; } }
        
        .match-card { background-color: var(--card-bg); border-radius: var(--border-radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; opacity: 0; transform: translateY(15px); will-change: transform, opacity; }
        .match-card.animate-in { animation: cardFadeIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .match-header { background-color: rgba(0, 0, 0, 0.15); padding: 10px; text-align: center; font-size: 0.85rem; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }
        .match-hero { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 10px 5px; background: linear-gradient(to bottom, rgba(255,255,255,0.02) 0%, transparent 100%); min-height: 100px;}
        .team { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .team-flag { width: 45px; height: auto; border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.2s; }
        .team-flag:hover { transform: scale(1.1); border-color: var(--accent-cyan); }
        .team-name { font-size: 1rem; font-weight: 800; white-space: nowrap; }
        .cards-container { display: flex; gap: 3px; height: 16px; margin-top: 2px; }
        .card-icon { width: 12px; height: 16px; border-radius: 2px; cursor: pointer; border: 1px solid rgba(0,0,0,0.3); transition: transform 0.2s; }
        .card-icon:hover { transform: scale(1.2) translateY(-2px); }
        .yellow-card { background-color: #f1c40f; } .red-card { background-color: #e74c3c; }
        
        .score-center { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 0 5px; }
        .score-label { font-size: 0.7rem; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; white-space: nowrap; transition: color 0.3s ease; }
        .score-number { font-size: 1.6rem; font-weight: 900; background-color: rgba(0, 0, 0, 0.3); padding: 4px 15px; border-radius: 8px; border: 1px solid var(--border-color); letter-spacing: 2px; white-space: nowrap; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); transition: all 0.3s ease; cursor: pointer;}
        .score-number:hover { transform: scale(1.05); }
        .score-number.is-actual.exact { color: var(--color-exact); border-color: rgba(0, 230, 118, 0.4); background-color: rgba(0, 230, 118, 0.1); text-shadow: 0 0 12px rgba(0, 230, 118, 0.4); }
        .score-number.is-actual.trend { color: var(--color-trend); border-color: rgba(255, 179, 0, 0.4); background-color: rgba(255, 179, 0, 0.1); text-shadow: 0 0 12px rgba(255, 179, 0, 0.4); }
        .score-number.is-actual.wrong { color: var(--color-wrong); border-color: rgba(255, 51, 51, 0.4); background-color: rgba(255, 51, 51, 0.1); text-shadow: 0 0 12px rgba(255, 51, 51, 0.4); }
        
        /* חלוקת הסתברויות מתוקנת LTR */
        .match-probabilities { padding: 0 20px 15px 20px; }
        .prob-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 800; direction: ltr;}
        .prob-bar-container { display: flex; height: 6px; border-radius: 4px; overflow: hidden; background-color: rgba(0,0,0,0.5); direction: ltr;}
        .prob-home { background-color: var(--accent-cyan); transition: width 0.5s ease;}
        .prob-draw { background-color: #8892b0; transition: width 0.5s ease;}
        .prob-away { background-color: #ff4d4d; transition: width 0.5s ease;}
        
        .chart-container { padding: 5px 15px; height: 160px; position: relative; }
        
        .inner-tabs { display: flex; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); background-color: rgba(0,0,0,0.15); }
        .inner-tab-btn { flex: 1; background: none; border: none; padding: 10px 5px; color: var(--text-muted); font-family: 'Heebo', sans-serif; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .inner-tab-btn.active { color: var(--accent-cyan); border-bottom: 2px solid var(--accent-cyan); background-color: rgba(102, 252, 241, 0.05); }
        .inner-tab-btn:disabled { color: #4a4f5c; cursor: not-allowed; }
        .tab-content { display: none; padding: 15px; flex-grow: 1; animation: tabFadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes tabFadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .insight-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .insight-title { font-size: 0.85rem; color: var(--accent-blue); font-weight: 800; }
        
        .risk-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; font-weight: 800; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .risk-safe { background: rgba(0,230,118,0.15); color: #00e676; border: 1px solid rgba(0,230,118,0.4); }
        .risk-draw { background: rgba(255,179,0,0.15); color: #ffb300; border: 1px solid rgba(255,179,0,0.4); }
        .risk-upset { background: rgba(255,51,51,0.15); color: #ff3333; border: 1px solid rgba(255,51,51,0.4); }

        .insight-text { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
        
        .adv-stats-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 5px;}
        .adv-stats-table th { color: var(--text-muted); font-weight: 400; padding: 4px 0; border-bottom: 1px dashed var(--border-color); }
        .adv-stats-table td { padding: 8px 0; text-align: center; font-weight: 600; }
        .adv-home { color: var(--text-main); text-align: right; }
        .adv-away { color: var(--text-main); text-align: left; }
        .adv-metric { color: var(--accent-cyan); font-size: 0.8rem; }

        .status-bar { padding: 10px; text-align: center; font-size: 0.8rem; font-weight: 600; }
        .status-pending-ui { background-color: rgba(255, 215, 0, 0.05); color: var(--color-pending); border-top: 1px solid rgba(255,215,0,0.2); }
        .status-exact-ui { background-color: rgba(0, 230, 118, 0.05); color: var(--color-exact); border-top: 1px solid rgba(0,230,118,0.2); }
        .status-trend-ui { background-color: rgba(255, 179, 0, 0.05); color: var(--color-trend); border-top: 1px solid rgba(255,179,0,0.2); }
        .status-wrong-ui { background-color: rgba(255, 51, 51, 0.05); color: var(--color-wrong); border-top: 1px solid rgba(255,51,51,0.2); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); width: 90%; max-width: 500px; padding: 25px; position: relative; animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; line-height: 1; }
        .modal-close:hover { color: var(--color-wrong); }
        .modal-title { font-size: 1.4rem; font-weight: 800; color: var(--accent-cyan); margin-bottom: 20px; text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}
        .modal-body { font-size: 1rem; line-height: 1.6; color: var(--text-main); }
        .squad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .squad-col h4 { margin: 0 0 10px 0; color: var(--text-muted); font-size: 0.9rem; border-bottom: 1px dashed var(--border-color); padding-bottom: 5px;}
        .squad-list { list-style: none; padding: 0; margin: 0; font-size: 0.9rem; }
        .diff-player { color: var(--color-trend); font-weight: 600; }
        .goal-item { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 8px 0; }
        .card-detail { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-title">מערכת מודל הסתברותי (Pro)</div>
        <div class="stats-panel" id="stats-panel"></div>

        <div class="filters-row">
            <div class="filter-group">
                <button class="filter-btn special-btn" onclick="toggleStandings()" id="btn-standings">📊 טבלת בתים מעודכנת</button>
            </div>
            <div class="filter-divider">|</div>
            <div class="filter-group">
                <span class="filter-label">זמן:</span>
                <button class="filter-btn time-btn active" data-time="all">הכל</button>
                <button class="filter-btn time-btn" data-time="past">שוחקו</button>
                <button class="filter-btn time-btn" data-time="future">עתיד</button>
            </div>
            <div class="filter-divider">|</div>
            <div class="filter-group">
                <span class="filter-label">בתים:</span>
                <button class="filter-btn stage-btn active" data-stage="all">הכל</button>
                <button class="filter-btn stage-btn" data-stage="A">א'</button>
                <button class="filter-btn stage-btn" data-stage="B">ב'</button>
                <button class="filter-btn stage-btn" data-stage="C">ג'</button>
                <button class="filter-btn stage-btn" data-stage="D">ד'</button>
                <button class="filter-btn stage-btn" data-stage="E">ה'</button>
                <button class="filter-btn stage-btn" data-stage="F">ו'</button>

                <button class="filter-btn stage-btn" data-stage="L">ל'</button>

        </div>
    </div>

    <div id="standings-container"></div>
    <div class="matches-grid" id="matches-container"></div>

    <div id="infoModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">

            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

        // פונקציות המערכת
        function renderStats() {
            if (typeof matchDatabase === 'undefined') return;
            let totalPast = 0; let exactHits = 0; let trendHits = 0;
            for (const key in matchDatabase) {
                if (matchDatabase[key].timeStatus === 'past') {
                    totalPast++;
                    if (matchDatabase[key].score.accuracyClass === 'exact') exactHits++;
                    if (matchDatabase[key].score.accuracyClass === 'trend') trendHits++;
                }
            }
            const exactPercent = totalPast === 0 ? 0 : Math.round((exactHits / totalPast) * 100);
            const trendPercent = totalPast === 0 ? 0 : Math.round((trendHits / totalPast) * 100);
            const totalAccuracy = totalPast === 0 ? 0 : Math.round(((exactHits + trendHits) / totalPast) * 100);

            document.getElementById('stats-panel').innerHTML = `
                <div class="stat-box"><div class="stat-value" style="color: var(--accent-cyan)">${totalPast}</div><div class="stat-label">משחקים שוחקו</div></div>
                <div class="stat-box"><div class="stat-value exact">${exactPercent}%</div><div class="stat-label">פגיעה בול</div></div>
                <div class="stat-box"><div class="stat-value trend">${trendPercent}%</div><div class="stat-label">פגיעת כיוון</div></div>
                <div class="stat-box" style="border-bottom: 3px solid var(--accent-cyan); background-color: rgba(102, 252, 241, 0.05);"><div class="stat-value" style="color: #fff">${totalAccuracy}%</div><div class="stat-label">הצלחה כללית</div></div>
            `;
        }

        function calculateAndRenderStandings() {
            if (typeof matchDatabase === 'undefined') return;
            const officialGroups = {
                'A': ['מקסיקו', 'קוריאה הדרומית', 'צ\'כיה', 'דרום אפריקה'], 'B': ['שוויץ', 'בוסניה והרצגובינה', 'קנדה', 'קטר'],

                'E': ['גרמניה', 'חוף השנהב', 'אקוודור', 'קוראסאו'], 'F': ['שוודיה', 'יפן', 'הולנד', 'תוניסיה'],
                'G': ['בלגיה', 'מצרים', 'איראן', 'ניו זלנד'], 'H': ['ספרד', 'קף ורדה', 'ערב הסעודית', 'אורוגוואי'],
                'I': ['צרפת', 'סנגל', 'עיראק', 'נורווגיה'], 'J': ['ארגנטינה', 'אלג\'יריה', 'אוסטריה', 'ירדן'],
                'K': ['פורטוגל', 'קונגו', 'אוזבקיסטן', 'קולומביה'], 'L': ['אנגליה', 'קרואטיה', 'גאנה', 'פנמה']
            };
            const teamFlags = {
                'מקסיקו': 'mx', 'קוריאה הדרומית': 'kr', 'צ\'כיה': 'cz', 'דרום אפריקה': 'za', 'שוויץ': 'ch', 'בוסניה והרצגובינה': 'ba', 'קנדה': 'ca', 'קטר': 'qa',
                'סקוטלנד': 'gb-sct', 'מרוקו': 'ma', 'ברזיל': 'br', 'האיטי': 'ht', 'ארצות הברית': 'us', 'אוסטרליה': 'au', 'טורקיה': 'tr', 'פרגוואי': 'py',
                'גרמניה': 'de', 'חוף השנהב': 'ci', 'אקוודור': 'ec', 'קוראסאו': 'cw', 'שוודיה': 'se', 'יפן': 'jp', 'הולנד': 'nl', 'תוניסיה': 'tn',
                'בלגיה': 'be', 'מצרים': 'eg', 'איראן': 'ir', 'ניו זלנד': 'nz', 'ספרד': 'es', 'קף ורדה': 'cv', 'ערב הסעודית': 'sa', 'אורוגוואי': 'uy',
                'צרפת': 'fr', 'סנגל': 'sn', 'עיראק': 'iq', 'נורווגיה': 'no', 'ארגנטינה': 'ar', 'אלג\'יריה': 'dz', 'אוסטריה': 'at', 'ירדן': 'jo',
                'פורטוגל': 'pt', 'קונגו': 'cg', 'אוזבקיסטן': 'uz', 'קולומביה': 'co', 'אנגליה': 'gb-eng', 'קרואטיה': 'hr', 'גאנה': 'gh', 'פנמה': 'pa'
            };

            const standings = {};
            for (const grp in officialGroups) {
                standings[grp] = {};
                officialGroups[grp].forEach(team => { standings[grp][team] = { p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0, flag: teamFlags[team] }; });
            }

            for (const key in matchDatabase) {
                const match = matchDatabase[key];
                if (match.timeStatus === 'past' && match.score.actual.includes('-')) {
                    const group = match.stage;
                    const tH = match.teamHome.name, tA = match.teamAway.name;
                    if(standings[group] && standings[group][tH] && standings[group][tA]) {
                        const scores = match.score.actual.split('-');
                        const gH = parseInt(scores[0].trim());
                        const gA = parseInt(scores[1].trim());

                        standings[group][tH].p++; standings[group][tH].gf += gH; standings[group][tH].ga += gA;
                        standings[group][tA].p++; standings[group][tA].gf += gA; standings[group][tA].ga += gH;

                        if (gH > gA) { standings[group][tH].w++; standings[group][tH].pts += 3; standings[group][tA].l++; } 
                        else if (gA > gH) { standings[group][tA].w++; standings[group][tA].pts += 3; standings[group][tH].l++; } 
                        else { standings[group][tH].d++; standings[group][tA].d++; standings[group][tH].pts += 1; standings[group][tA].pts += 1; }
                    }
                }
            }

            const container = document.getElementById('standings-container');
            container.innerHTML = '';
            const groupOrder = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
            const groupNamesHeb = {'A': "א'", 'B': "ב'", 'C': "ג'", 'D': "ד'", 'E': "ה'", 'F': "ו'", 'G': "ז'", 'H': "ח'", 'I': "ט'", 'J': "י'", 'K': "כ'", 'L': "ל'"};

            groupOrder.forEach(grp => {
                const sortedTeams = Object.keys(standings[grp]).map(name => {
                    const t = standings[grp][name]; t.name = name; t.gd = t.gf - t.ga; return t;
                }).sort((a, b) => { if (b.pts !== a.pts) return b.pts - a.pts; if (b.gd !== a.gd) return b.gd - a.gd; return b.gf - a.gf; });

                let trs = '';
                sortedTeams.forEach((t, i) => {
                    const isTopTwo = i < 2;
                    const rowStyle = isTopTwo ? 'background-color: rgba(0, 230, 118, 0.08);' : '';
                    const rankStyle = isTopTwo ? 'color: var(--color-exact); font-weight: 900;' : 'color:var(--text-muted)';
                    trs += `<tr style="${rowStyle}">
                        <td style="${rankStyle}">${i+1}</td>
                        <td><div class="team-cell"><img src="https://flagcdn.com/w20/${t.flag}.png"> ${t.name}</div></td>
                        <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
                        <td>${t.gf}-${t.ga}</td><td style="direction:ltr">${t.gd > 0 ? '+'+t.gd : t.gd}</td>
                        <td style="font-weight:900; color:var(--accent-cyan)">${t.pts}</td>
                    </tr>`;
                });

                container.innerHTML += `
                <div class="group-table-card">
                    <div class="group-table-title">בית ${groupNamesHeb[grp]}</div>
                    <table class="standings-table">
                        <tr><th>#</th><th style="text-align:right">נבחרת</th><th>מ</th><th>נ</th><th>ת</th><th>ה</th><th>שערים</th><th>הפ'</th><th>נק'</th></tr>
                        ${trs}
                    </table>
                </div>`;
            });
        }

            if(el.style.display === 'none' || el.style.display === '') { el.style.display = 'flex'; btn.classList.add('active'); } 
            else { el.style.display = 'none'; btn.classList.remove('active'); }

                    <div id="${matchId}-sum" class="tab-content ${isPast ? 'active' : ''}"><div class="insight-title">🎯 פוסט-משחק</div><div class="insight-text">${data.insight.actual}</div>${isPast ? statusBarHTML : ''}</div>
                    <div id="${matchId}-adv" class="tab-content ${!isPast ? 'active' : ''}">
                        <div class="insight-title">🔬 מדדי עומק (Advanced)</div>
                        <table class="adv-stats-table">
                            <tr><td class="adv-home">${adv.home.xG}</td><td class="adv-metric">xG (צפי שערים)</td><td class="adv-away">${adv.away.xG}</td></tr>
                            <tr><td class="adv-home">${adv.home.restDays}</td><td class="adv-metric">ימי מנוחה</td><td class="adv-away">${adv.away.restDays}</td></tr>
                            <tr><td class="adv-home">${adv.home.altitudeImpact}</td><td class="adv-metric">אקלים וסביבה</td><td class="adv-away">${adv.away.altitudeImpact}</td></tr>
                        </table>
                    </div>
                </div>`;
                htmlChunks.push(chunk);
            }

            container.innerHTML = htmlChunks.join('');

            Chart.defaults.color = '#cbd5e1'; Chart.defaults.font.family = 'Heebo';
            const opts = { responsive: true, maintainAspectRatio: false, scales: { r: { angleLines: { color: 'rgba(255,255,255,0.15)', lineWidth: 1.5 }, grid: { color: 'rgba(255,255,255,0.15)', lineWidth: 1.5 }, pointLabels: { font: { size: 10, weight: '800' }, color: '#e2e8f0' }, ticks: { display: false, min: 0, max: 100 } } }, plugins: { legend: { display: false } } };
            const lbls = ['טכניקה', 'החזקה', 'נייחים', 'מנטלי', 'פיזיות', 'איכות סגל'];

            for (const [matchId, data] of Object.entries(matchDatabase)) {
                const canvasElement = document.getElementById(`chart-${matchId}`);
                if (canvasElement) {
                    new Chart(canvasElement.getContext('2d'), { 
                        type: 'radar', data: { labels: lbls, datasets: [ 
                            { data: data.radarStats.home, borderColor: data.teamHome.color, backgroundColor: `${data.teamHome.color}4D`, pointBackgroundColor: data.teamHome.color, borderWidth: 2 }, 
                            { data: data.radarStats.away, borderColor: data.teamAway.color, backgroundColor: `${data.teamAway.color}4D`, pointBackgroundColor: data.teamAway.color, borderWidth: 2 } 
                        ]}, options: opts 
                    });
                }
            }
        }

        const modal = document.getElementById('infoModal'), modalTitle = document.getElementById('modalTitle'), modalBody = document.getElementById('modalBody');
        function openModal(title, contentHTML) { modalTitle.innerHTML = title; modalBody.innerHTML = contentHTML; modal.style.display = 'flex'; }
        function closeModal(e) { if(e) e.preventDefault(); modal.style.display = 'none'; }
        
        function openGoalsModal(matchId) { 
            const scoreEl = document.getElementById(`${matchId}-score`); 
            if(!scoreEl || !scoreEl.classList.contains('is-actual')) return; 
            const data = matchDatabase[matchId]; 
            let html = ''; 
            (data.goals || []).forEach(g => { html += `<div class="goal-item"><span>⚽ ${g.player} (${g.minute})</span><span style="color: var(--text-muted); font-size:0.85rem">${g.team}</span></div>`; }); 
            if(!data.goals || data.goals.length === 0) html = "<div style='text-align:center'>0-0 (אין שערים)</div>"; 
            openModal(`פירוט שערים - ${data.teamHome.name} מול ${data.teamAway.name}`, html); 
        }

        function openSquadModal(matchId, side) { 
            const data = matchDatabase[matchId]; 
            const squadKey = side === 'teamHome' ? 'home' : 'away'; 
            if(!data.squads || !data.squads[squadKey] || !data.squads[squadKey].predicted || data.squads[squadKey].predicted.length === 0) { openModal("סגל", "נתוני סגל מפורטים יועלו בהמשך הטורניר."); return; } 
            const predHTML = data.squads[squadKey].predicted.map(p => `<li>${p}</li>`).join(''); 
            const actualHTML = data.squads[squadKey].actual.length > 0 ? data.squads[squadKey].actual.map(p => `<li class="${p.includes('(חריגה)') ? 'diff-player' : ''}">${p}</li>`).join('') : "<li>טרם נקבע</li>"; 
            const html = `<div class="squad-grid"><div class="squad-col"><h4>תחזית המודל</h4><ul class="squad-list">${predHTML}</ul></div><div class="squad-col"><h4>שיחקו בפועל</h4><ul class="squad-list">${actualHTML}</ul></div></div>`; 
            openModal(`סגל נבחרת ${data[side].name}`, html); 
        }

        function openCardModal(matchId, side, type) { 
            const data = matchDatabase[matchId]; 
            const colorName = type === 'yellow' ? 'צהוב' : 'אדום'; 
            const iconColor = type === 'yellow' ? '#f1c40f' : '#e74c3c'; 
            let html = ''; 
            (data[side].cards[type] || []).forEach(c => { html += `<div class="card-detail" style="margin-bottom: 10px;"><div style="width: 15px; height: 20px; background-color: ${iconColor}; border-radius: 3px;"></div><span>${c}</span></div>`; }); 
            openModal(`פירוט כרטיסים - ${data[side].name}`, html); 
        }

        let currentTimeFilter = 'all'; let currentStageFilter = 'all';
        function applyFilters() { document.querySelectorAll('.match-card').forEach(card => { const tMatch = (currentTimeFilter === 'all' || currentTimeFilter === card.getAttribute('data-time')); const sMatch = (currentStageFilter === 'all' || currentStageFilter === card.getAttribute('data-stage')); if (tMatch && sMatch) { if (card.style.display === 'none' || card.style.display === '') card.style.display = 'flex'; card.classList.remove('animate-in'); void card.offsetWidth; card.classList.add('animate-in'); } else { card.classList.remove('animate-in'); card.style.display = 'none'; } }); }
        document.querySelectorAll('.time-btn').forEach(btn => btn.addEventListener('click', (e) => { document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active')); e.target.classList.add('active'); currentTimeFilter = e.target.getAttribute('data-time'); applyFilters(); }));
        document.querySelectorAll('.stage-btn').forEach(btn => btn.addEventListener('click', (e) => { document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active')); e.target.classList.add('active'); currentStageFilter = e.target.getAttribute('data-stage'); applyFilters(); }));

        function switchCardTab(cardId, tabType, scoreText, labelText, accuracyLevel) { 
            const card = document.getElementById(`${cardId}-score`).closest('.match-card');
            const predTab = card.querySelector(`#${cardId}-pred`), sumTab = card.querySelector(`#${cardId}-sum`), advTab = card.querySelector(`#${cardId}-adv`);
            const btns = card.querySelectorAll('.inner-tab-btn'); 
            
            btns.forEach(b => b.classList.remove('active')); 
            predTab.classList.remove('active'); sumTab.classList.remove('active'); advTab.classList.remove('active');
            
            if (tabType === 'pred') { btns[0].classList.add('active'); predTab.classList.add('active'); } 
            else if (tabType === 'sum') { btns[1].classList.add('active'); sumTab.classList.add('active'); } 
            else if (tabType === 'adv') { btns[2].classList.add('active'); advTab.classList.add('active'); }
            
            const labelEl = card.querySelector(`.score-label`), scoreEl = card.querySelector(`.score-number`); 
            labelEl.innerText = labelText; scoreEl.innerText = scoreText; 
            scoreEl.classList.remove('is-actual', 'exact', 'trend', 'wrong'); 
            
            if(tabType === 'sum' || (tabType === 'adv' && accuracyLevel)) { 
                scoreEl.classList.add('is-actual'); 
                if (accuracyLevel) { 
                    scoreEl.classList.add(accuracyLevel); 
                    if(accuracyLevel === 'exact') labelEl.style.color = 'var(--color-exact)'; 
                    else if(accuracyLevel === 'trend') labelEl.style.color = 'var(--color-trend)'; 
                    else if(accuracyLevel === 'wrong') labelEl.style.color = 'var(--color-wrong)'; 
                } 
            } else { labelEl.style.color = 'var(--accent-cyan)'; } 
        }

        window.addEventListener('DOMContentLoaded', () => { 
            renderStats(); calculateAndRenderStandings(); renderMatches(); applyFilters(); 
        });
    </script>
</body>
</html>
