<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד מונדיאל 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="sidebar" id="main-sidebar">
        <div class="sidebar-logo">מונדיאל 2026<span>תחזיות וסטטיסטיקה</span></div>
        
        <a id="nav-matches" class="nav-link active" onclick="switchView('matches')">⚽ שלב הבתים</a>
        <a id="nav-standings" class="nav-link" onclick="switchView('standings')">📊 טבלאות</a>
        <a id="nav-scorers" class="nav-link" onclick="switchView('scorers')">👟 מלך השערים</a>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileMenu()"></div>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-header-row">
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
                <div class="topbar-title" id="main-title">שלב הבתים - מודל הסתברותי</div>
            </div>
            
            <div class="topbar-stats">
                <div class="mini-stat">משחקים: <span id="stat-total">0</span></div>
                <div class="mini-stat">פגיעה בול: <span id="stat-exact" style="color:var(--color-exact)">0%</span></div>
                <div class="mini-stat">מגמה: <span id="stat-trend" style="color:var(--color-trend)">0%</span></div>
                <div class="mini-stat">הצלחה: <span id="stat-overall" style="color:var(--accent-cyan)">0%</span></div>
            </div>
        </div>

        <div class="content-wrapper">
            <div id="matches-view">
                <div class="filters-row">
                    <div class="filter-group">
                        <button class="filter-btn active" onclick="applyFilter('all')">הכל</button>
                        <button class="filter-btn" onclick="applyFilter('past')">הסתיימו</button>
                        <button class="filter-btn" onclick="applyFilter('future')">עתידיים</button>
                    </div>
                    
                    <span class="filter-divider hidden-mobile">|</span>
                    
                    <div class="filter-group">
                        <span class="filter-label">בתים:</span>
                        <button class="filter-btn" onclick="applyFilter('A')">א'</button>
                        <button class="filter-btn" onclick="applyFilter('B')">ב'</button>
                        <button class="filter-btn" onclick="applyFilter('C')">ג'</button>
                        <button class="filter-btn" onclick="applyFilter('D')">ד'</button>
                        <button class="filter-btn" onclick="applyFilter('E')">ה'</button>
                        <button class="filter-btn" onclick="applyFilter('F')">ו'</button>
                    </div>
                </div>

                <div class="matches-grid" id="matches-container"></div>
            </div>

            <div id="standings-view" style="display:none;"></div>
            <div id="scorers-view" style="display:none;"></div>
        </div>
    </div>

    <script>const matchDatabase = {};</script>
    <script src="data/md2.js"></script>
    <script src="engine.js"></script>
</body>
</html>
