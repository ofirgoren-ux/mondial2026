<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מונדיאל 2026 - דשבורד פרו</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleMobileMenu()"></div>

    <nav class="sidebar" id="main-sidebar">
        <div class="sidebar-logo">
            MUNDIAL 2026
            <span>AI Dashboard</span>
        </div>

        <div class="sidebar-section-title">ניווט ראשי</div>
        <a id="nav-matches" class="nav-link active" onclick="switchView('matches')">🏠 שלב הבתים</a>
        
        <div class="sidebar-submenu" id="submenu-matchdays">
            <button class="submenu-btn active" data-md="all">כל המשחקים</button>
            <button class="submenu-btn" data-md="1">מחזור 1</button>
            <button class="submenu-btn" data-md="2">מחזור 2</button>
            <button class="submenu-btn" data-md="3">מחזור 3</button>
            <button class="submenu-btn" data-md="ko">נוקאאוט</button>
        </div>

        <a id="nav-standings" class="nav-link" onclick="switchView('standings')">📊 טבלת בתים</a>
        <a id="nav-scorers" class="nav-link" onclick="switchView('scorers')">⚽ מלך השערים</a>
        <a id="nav-bracket" class="nav-link" onclick="switchView('bracket')">🏆 עץ הנוקאאוט</a>
    </nav>

    <main class="main-content">
        <header class="topbar sticky-header">
            <div class="topbar-row-1">
                <div class="topbar-titles">
                    <div class="title-wrapper">
                        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
                        <h1 class="topbar-title" id="main-title">שלב הבתים – מודל הסתברותי</h1>
                    </div>
                    <div class="hero-intro">
                        סקירה וניתוח סטטיסטי של משחקי הטורניר, מבוסס מודל למידת מכונה (AI).
                    </div>
                </div>
                
                <div class="topbar-stats">
                    <div class="stat-card">
                        <div class="stat-num" id="stat-total" style="color:var(--text-main)">0</div>
                        <div class="stat-lbl">סה"כ משחקים</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="stat-exact" style="color:var(--color-exact)">0%</div>
                        <div class="stat-lbl">פגיעה מדויקת</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="stat-trend" style="color:var(--color-trend)">0%</div>
                        <div class="stat-lbl">כיוון נכון</div>
                    </div>
                    <div class="stat-card" style="background: rgba(102, 252, 241, 0.1); border-color: rgba(102, 252, 241, 0.3);">
                        <div class="stat-num" id="stat-overall" style="color:var(--accent-cyan)">0%</div>
                        <div class="stat-lbl">אחוזי הצלחה</div>
                    </div>
                </div>
            </div>

            <div class="topbar-row-2">
                <div class="filters-row" id="main-filters">
                    <div class="filter-group">
                        <span class="filter-label">זמן:</span>
                        <button class="filter-btn time-btn active" data-time="all">הכל</button>
                        <button class="filter-btn time-btn" data-time="past">שוחקו</button>
                        <button class="filter-btn time-btn" data-time="future">עתיד</button>
                    </div>
                    <div class="filter-divider">|</div>
                    <div class="filter-group">
                        <span class="filter-label">בתים:</span>
                        <button class="filter-btn stage-btn active" data-stage="all">הכל</button>
                        <button class="filter-btn stage-btn" data-stage="A">א'</button>
                        <button class="filter-btn stage-btn" data-stage="B">ב'</button>
                        <button class="filter-btn stage-btn" data-stage="C">ג'</button>
                        <button class="filter-btn stage-btn" data-stage="D">ד'</button>
                        <button class="filter-btn stage-btn" data-stage="E">ה'</button>
                        <button class="filter-btn stage-btn" data-stage="F">ו'</button>
                        <button class="filter-btn stage-btn" data-stage="G">ז'</button>
                        <button class="filter-btn stage-btn" data-stage="H">ח'</button>
                        <button class="filter-btn stage-btn" data-stage="I">ט'</button>
                        <button class="filter-btn stage-btn" data-stage="J">י'</button>
                        <button class="filter-btn stage-btn" data-stage="K">י"א</button>
                        <button class="filter-btn stage-btn" data-stage="L">י"ב</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-wrapper">
            <div id="matches-view">
                <div id="matches-container" class="matches-grid"></div>
            </div>

            <div id="standings-view"></div>
            <div id="scorers-view"></div>

            <div id="bracket-view" style="display:none; animation: tabFadeIn 0.4s ease;">
                <div class="knockout-container">
                    <div id="dynamic-bracket" class="tournament-bracket"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="data/md1.js"></script>
    <script src="data/md2.js"></script>
    <script src="data/md3.js"></script>
    <script src="data/knockoutData.js"></script>
    <script src="engine.js"></script>
</body>
</html>
