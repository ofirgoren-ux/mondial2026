<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">Mundial <span>2026</span></div>
        <div class="nav-title">Navigation</div>
        <div class="nav-link active" onclick="showView('matches')">Matches</div>
        <div class="nav-link" onclick="showView('standings')">Standings</div>
        <div class="nav-link" onclick="showView('bracket')">Knockout</div>
        <div class="nav-link" onclick="showView('scorers')">Scorers</div>
        <div class="model-info-box">
            <h4>AI Insights</h4>
            <ol>
                <li>Tournament Stats</li>
                <li>Match Predictions</li>
                <li>Player Analysis</li>
            </ol>
        </div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <div class="header-titles">
                <h1>Tournament Overview</h1>
                <p>Real-time updates and AI-driven projections</p>
            </div>
            <div class="stats-row" id="top-stats">
                </div>
        </div>

        <div id="matches-view" class="view-content">
            <div class="filters-row">
                <div class="filter-group">
                    <span class="filter-label">Stage</span>
                    <button class="stage-btn active">Group</button>
                    <button class="stage-btn">Knockout</button>
                </div>
            </div>
            <div class="matches-grid" id="matches-container"></div>
        </div>

        <div id="standings-view" class="view-content" style="display:none;"></div>

        <div id="bracket-view" class="view-content" style="display:none;">
            <div class="knockout-container" id="dynamic-bracket"></div>
        </div>

        <div id="scorers-view" class="view-content" style="display:none;">
            <div class="scorers-dashboard" id="scorers-container"></div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content" id="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="knockoutData.js"></script>
    <script src="engine.js"></script>
</body>
</html>
